<!DOCTYPE html>
<html>
<head>
    <title>Detection Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>Detection Result</h2>

    <img src="{{ url_for('static', filename='results/' + image) }}" class="result-img">

    <!-- Cancer Status Box -->
    {% if cancer_status == "YES" %}
        <div class="result-box high-risk">
            Cancer Detected: YES
        </div>
    {% else %}
        <div class="result-box safe">
            Cancer Detected: NO
        </div>
    {% endif %}

    <!-- Confidence Box -->
    <div class="result-box">
        Detection Confidence: {{ confidence }}%
    </div>

    <!-- Risk Level Box -->
    {% if "High" in risk %}
        <div class="result-box high-risk">
            {{ risk }}
        </div>
    {% elif "Moderate" in risk %}
        <div class="result-box moderate-risk">
            {{ risk }}
        </div>
    {% else %}
        <div class="result-box safe">
            {{ risk }}
        </div>
    {% endif %}

    <br>
    <a href="/dashboard">Analyze Another Image</a>
</div>

</body>
</html>
